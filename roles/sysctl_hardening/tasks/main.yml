---
- name: Deploy sysctl hardening config file
  ansible.builtin.template:
    src: 90-hardening.conf.j2
    dest: /etc/sysctl.d/90-hardening.conf
    owner: root
    group: root
    mode: '0644'

- name: Apply each sysctl value
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/90-hardening.conf
    reload: false
  loop: "{{ sysctl_hardening | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Reload all sysctl values
  ansible.builtin.command: sysctl --system
  changed_when: false
