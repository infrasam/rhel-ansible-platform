---
- name: Ensure ansible user exists
  ansible.builtin.user:
    name: "{{ ansible_user_name }}"
    comment: "{{ ansible_user_comment }}"
    shell: /bin/bash
    create_home: true
    state: present
  tags: [users]

- name: Configure passwordless sudo for ansible
  ansible.builtin.copy:
    dest: /etc/sudoers.d/ansible
    content: "ansible ALL=(ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: '0440'
    validate: 'visudo -cf %s'
  tags: [users, sudo]

- name: Deploy ansible authorized_keys
  ansible.posix.authorized_key:
    user: "{{ ansible_user_name }}"
    state: present
    key: "{{ lookup('file', 'ansible_id_ed25519.pub') }}"
    exclusive: false
  tags: [users, ssh]

- name: Deploy sshd hardening drop-in
  ansible.builtin.template:
    src: sshd_hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/50-hardening.conf
    owner: root
    group: root
    mode: '0600'
    validate: 'sshd -t -f %s'
  notify: Reload sshd
  tags: [ssh, hardening]
